name: Tests

on:
  push:
    branches: [main, master, develop]
    tags:
      - "v*"
    paths-ignore:
      - "*.md"
      - "docs/**"
  pull_request:
    branches: [main, master, develop]
    paths-ignore:
      - "*.md"
      - "docs/**"

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run lint
        run: bun run lint

      - name: Verify docs generation if preparing for release
        if: github.ref == 'refs/heads/main'
        run: bun run docs:verify

  unit-tests:
    runs-on: ubuntu-latest
    needs: [lint]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run unit tests
        run: bun run test:unit

  smoke-tests:
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build package for tests
        run: bun run package:test

      - name: Install test dependencies
        run: cd test && bun install --frozen-lockfile --no-verify

      - name: Run smoke tests
        run: cd test && bun run test:smoke

  component-tests:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
    needs: [lint, unit-tests]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build package for tests
        run: bun run package:test

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: atlas-chain-sdk-package
          path: atlas-chain-sdk-latest.tgz
          retention-days: 30

      - name: Install test dependencies
        run: cd test && bun install --frozen-lockfile --no-verify

      - name: Pull local test Docker images
        run: |
          docker pull ghcr.io/atlas-chain/arkiv-node-dev-int:0.1.7
          docker pull ghcr.io/atlas-chain/atlas-payload-provider:v0.1.2

      # Using a test private key (randomly generated for testing purposes only)
      - name: Run component tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: true
          PRIVATE_KEY: "0x049f4de101c81033ab95e057fa3535c131b1da022a1922cd175cf6b63d263892"
        run: cd test && bun run test:component

  publish:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [smoke-tests]
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Verify tag matches package version
        run: |
          version=$(bun -e "console.log(require('./package.json').version)")
          tag="${GITHUB_REF_NAME#v}"
          echo "Package version: $version"
          echo "Git tag version: $tag"
          if [ "$version" != "$tag" ]; then
            echo "Tag v$tag does not match package.json version $version"
            exit 1
          fi

      - name: Prepare package for publish
        run: |
          echo "=== Preparing package for publish ==="
          bun prepublishOnly

      - name: Publish to npm
        run: |
          echo "=== Publishing package ==="
          set +e
          npm publish ./atlas-chain-sdk-latest.tgz --access public --provenance 2>&1
          publish_status=$?
          set -e
          if [ "$publish_status" -ne 0 ]; then
            echo "=== PUBLISH FAILED ==="
            echo "Exit code: $publish_status"
            echo "=== Full output (stdout + stderr) ==="
            exit "$publish_status"
          fi

      - name: Get release version
        id: release_version
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "Version: $version"
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Create github release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          body: |
            ## NPM Release
            https://www.npmjs.com/package/@atlas-chain/sdk/v/${{ steps.release_version.outputs.version }}
          draft: false
          prerelease: false
